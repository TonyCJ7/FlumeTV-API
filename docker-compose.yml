services:
  postgres:
    image: postgres:16-alpine
    container_name: flumetv-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: flumetv
      POSTGRES_PASSWORD: flumetv
      POSTGRES_DB: flumetv
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - ./postgres-data:/var/lib/postgresql/data
    networks:
      - api-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flumetv -d flumetv"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    image: tonycj7/flumetv-api:latest
    container_name: flumetv-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${PORT:-7001}:${PORT:-7001}"
    env_file:
      - .env
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL:-postgresql://flumetv:flumetv@postgres:5432/flumetv}
    networks:
      - api-network

volumes:
  postgres-data:

networks:
  api-network:
    driver: bridge
