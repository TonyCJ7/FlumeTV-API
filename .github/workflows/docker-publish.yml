# Builds and pushes tonycj7/flumetv-api images to Docker Hub.
#
# Tags (from package.json "version", e.g. 1.0.0):
#   Dockerfile → latest, {version}
#
# Triggers on push to main only (includes PR merges — merging creates a push to main).
#
# Repository secrets:
#   DOCKERHUB_USERNAME — Docker Hub user (e.g. tonycj7)
#   DOCKERHUB_TOKEN    — Docker Hub access token (not account password)

name: Publish Docker images

on:
  push:
    branches:
      - main

concurrency:
  group: docker-publish-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE: tonycj7/flumetv-api

jobs:
  publish:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read package.json version
        id: pkg
        run: echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push image (Dockerfile)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ steps.pkg.outputs.version }}
          cache-from: type=gha,scope=flumetv-api
          cache-to: type=gha,mode=max,scope=flumetv-api
